<!DOCTYPE html>

<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <title>Assets</title>
    <meta name="title" content="@@title">
    <meta name="description" content="@@description">
    <meta property="og:type" content="website">
    <meta property="og:title" content="@@title">
    <meta property="og:description" content="@@description">
    <meta property="og:image" content="@@image">
    <meta property="og:url" content="@@url">
    <meta name="twitter:image" content="@@image">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="images/favicon.svg" sizes="32x32">
    <link rel="apple-touch-icon" href="images/favicon.svg">
    <link rel="stylesheet" href="dist/css/main.css">
    <script src="dist/js/main.js" defer></script>
  </head>

  <body class="text-xs">
    <header class="px-4 py-5 sm:px-10 sm:py-6 border-b border-zinc-200 flex items-center gap-8">
      <a href="/"><img src="/images/favicon.svg" alt="lee" class="w-3.5 h-3.5"></a>
      <nav>
        <ul class="flex items-center gap-8">
          <li><a href="/employees.html">Employees</a></li>
          <li><a href="/assets.html">Assets</a></li>
        </ul>
      </nav>
    </header>

    <section class="p-4 sm:p-10">
      <div class="border border-zinc-200 rounded-md">
        <div class="p-3 flex sm:items-center justify-between gap-3 flex-col sm:flex-row">
          <h3 class="text-sm font-black">Assets <span aria-hidden="true" class="text-zinc-300">20</span></h3>
          <div class="w-full sm:w-auto flex items-center gap-3">
            <form class="search-form w-full flex items-center">
              <div class="w-full relative">
                <label for="query" class="sr-only">Search employees</label>
                <input id="query" name="query" type="text" placeholder="Jane" class="w-full h-7.5 px-3 border border-zinc-200 bg-white rounded-s-md relative focus-visible:z-10" />
                <a href="#" class="p-1 absolute top-1/2 -right-1 -translate-1/2">
                  <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-2 h-2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </a>
              </div>
              <div>
                <button type="submit" class="h-7.5 px-3 py-1.5 border border-zinc-200 border-l-0 bg-zinc-100 rounded-e-md cursor-pointer relative focus-visible:z-10">Search</button>
              </div>
            </form>
            <button onclick="create_modal.showModal()" class="h-7.5 px-3 py-1.5 border border-zinc-200 bg-zinc-100 rounded-md cursor-pointer">Create</button>
            <dialog id="create_modal" class="modal">
              <div class="modal-box">
                <h3 class="text-lg font-bold">Create asset</h3>
              </div>
              <form method="dialog" class="modal-backdrop"><button>close</button></form>
            </dialog>
          </div>
        </div>
        <div class="overflow-auto">
          <table class="w-full min-w-200 text-left table-fixed">
            <thead>
              <tr class="border-t border-zinc-200">
                <th class="w-11 pl-3 py-4.5"></th>
                <th class="px-3 py-4.5">
                  <a class="inline-flex items-center gap-1 cursor-pointer">
                    <span>Name</span>
                    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </a>
                </th>
                <th class="px-3 py-4.5">Serial number</th>
                <th class="px-3 py-4.5">Employee</th>
                <th class="px-3 py-4.5">Assigned at</th>
              </tr>
            </thead>
            <tbody>
              <tr class="group border-t border-zinc-200">
                <td class="pl-3 py-3">
                  <button class="w-7.5 h-7.5 shrink-0 flex items-center justify-center text-center border border-none rounded-md cursor-pointer hover:bg-zinc-100" popovertarget="popover-1" style="anchor-name:--anchor-1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3 hidden group-has-hover:block"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 group-has-hover:hidden"><path d="M10 8h.01"/><path d="M12 12h.01"/><path d="M14 8h.01"/><path d="M16 12h.01"/><path d="M18 8h.01"/><path d="M6 8h.01"/><path d="M7 16h10"/><path d="M8 12h.01"/><rect width="20" height="16" x="2" y="4" rx="2"/></svg>
                  </button>
                  <ul id="popover-1" class="dropdown w-52 mt-1 rounded-box bg-base-100 border border-zinc-200" popover style="position-anchor:--anchor-1">
                    <li>
                      <button onclick="edit_modal.showModal()" class="w-full p-3 text-left cursor-pointer">Edit</button>
                      <dialog id="edit_modal" class="modal">
                        <div class="modal-box">
                          <h3 class="text-lg font-bold">Create asset</h3>
                        </div>
                        <form method="dialog" class="modal-backdrop"><button>close</button></form>
                      </dialog>
                    </li>
                    <li class="border-t border-zinc-200">
                      <button onclick="delete_modal.showModal()" class="w-full p-3 text-left text-red-500 cursor-pointer">Delete</button>
                      <dialog id="delete_modal" class="modal">
                        <div class="modal-box">
                          <h3 class="text-lg font-bold">Create asset</h3>
                        </div>
                        <form method="dialog" class="modal-backdrop"><button>close</button></form>
                      </dialog>
                    </li>
                  </ul>
                </td>
                <td class="p-3">Keyboard Logitech K120</td>
                <td class="p-3">SN-000000</td>
                <td class="p-3">Emily Watson</td>
                <td class="p-3">31.12.1999</td>
              </tr>
              <tr class="group border-t border-zinc-200">
                <td class="pl-3 py-3">
                  <button class="w-7.5 h-7.5 shrink-0 flex items-center justify-center text-center border border-none rounded-md cursor-pointer hover:bg-zinc-100" popovertarget="popover-1" style="anchor-name:--anchor-1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3 hidden group-has-hover:block"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 group-has-hover:hidden"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
                  </button>
                  <ul id="popover-1" class="dropdown w-52 mt-1 rounded-box bg-base-100 border border-zinc-200" popover style="position-anchor:--anchor-1">
                    <li>
                      <button onclick="edit_modal.showModal()" class="w-full p-3 text-left cursor-pointer">Edit</button>
                      <dialog id="edit_modal" class="modal">
                        <div class="modal-box">
                          <h3 class="text-lg font-bold">Create asset</h3>
                        </div>
                        <form method="dialog" class="modal-backdrop"><button>close</button></form>
                      </dialog>
                    </li>
                    <li class="border-t border-zinc-200">
                      <button onclick="delete_modal.showModal()" class="w-full p-3 text-left text-red-500 cursor-pointer">Delete</button>
                      <dialog id="delete_modal" class="modal">
                        <div class="modal-box">
                          <h3 class="text-lg font-bold">Create asset</h3>
                        </div>
                        <form method="dialog" class="modal-backdrop"><button>close</button></form>
                      </dialog>
                    </li>
                  </ul>
                </td>
                <td class="p-3">iPad Air</td>
                <td class="p-3">SN-000000</td>
                <td class="p-3">None</td>
                <td class="p-3">None</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="p-3 border-t border-zinc-200 flex items-center justify-between gap-3">
          <div class="flex items-center gap-3">
            <a class="w-7.5 h-7.5 flex items-center justify-center text-center border border-zinc-200 bg-zinc-100 rounded-md cursor-pointer">1</a>
            <a class="w-7.5 h-7.5 flex items-center justify-center text-center border border-zinc-200 bg-zinc-100 rounded-md cursor-pointer">2</a>
            <a class="w-7.5 h-7.5 flex items-center justify-center text-center border border-zinc-200 bg-zinc-100 rounded-md cursor-pointer">3</a>
          </div>
          <div class="flex items-center gap-3">
            <a data-page="4" class="pagination-button h-7.5 px-3 py-1.5 border border-zinc-200 bg-zinc-100 rounded-md cursor-pointer">Prev</a>
            <a data-page="5" class="pagination-button h-7.5 px-3 py-1.5 border border-zinc-200 bg-zinc-100 rounded-md cursor-pointer">Next</a>
          </div>
        </div>
      </div>
    </section>
  </body>

</html>
